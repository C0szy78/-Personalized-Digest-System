name: Staging WordPress cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-wordpress-cron
  cancel-in-progress: false

jobs:
  trigger-wp-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger staging WP-Cron
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 5 --max-time 60 \
            "https://domain1.badev.tools/wp-cron.php?doing_wp_cron"
